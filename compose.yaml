services:
  postgres:
    image: postgres:17
    container_name: stormwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    command: standalone
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
      AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "30"
      DB_HOST: postgres
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/airflow/project
      - airflow_home:/opt/airflow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  airflow_home:
  postgres_data:
