name: "stormwatch_vietnam"


version: "1.0.0"

# Determines which profile in profiles.yml dbt should use.
profile: "stormwatch_vietnam"

# Project file locations.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Folders generated by dbt.
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Configure model schemas and materialisations.
models:
  stormwatch_vietnam:


    staging:
      +materialized: view
      +schema: staging


    intermediate:
      +materialized: view
      +schema: intermediate


    marts:
      +materialized: table
      +schema: marts
