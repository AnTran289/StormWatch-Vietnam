version: 2

models:

  - name: fact_risk_scores

    description: >
      Hourly prototype weather-risk indicators for each province.

    columns:
      - name: weather_id
        data_tests:
          - unique
          - not_null

      - name: location_id
        data_tests:
          - not_null

      - name: forecast_time
        data_tests:
          - not_null

      - name: rain_risk_level
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Low
                  - Moderate
                  - High
                  - Extreme

      - name: storm_risk_level
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Low
                  - Moderate
                  - High
                  - Extreme

      - name: flood_risk_level
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Low
                  - Moderate
                  - High
                  - Extreme

      - name: disaster_risk_level
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Low
                  - Moderate
                  - High
                  - Extreme

  - name: province_risk_snapshot

    description: >
      Highest forecast risk record for each of Vietnam's
      34 provincial-level units.

    columns:
      - name: location_id
        data_tests:
          - unique
          - not_null

      - name: province_code
        data_tests:
          - unique
          - not_null

      - name: province_name
        data_tests:
          - not_null

      - name: peak_risk_time
        data_tests:
          - not_null

      - name: peak_risk_level
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Low
                  - Moderate
                  - High
                  - Extreme