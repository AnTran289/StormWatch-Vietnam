version: 2

sources:

  # Logical source name used by source() in SQL models.
  - name: stormwatch_raw

    # PostgreSQL database containing the source tables.
    database: "{{ env_var('DB_NAME', 'stormwatch') }}"

    # PostgreSQL schema containing weather data.
    schema: raw

    description: >
      Raw weather data collected from the Open-Meteo Forecast API.

    tables:
      - name: weather_hourly

        description: >
          Versioned hourly forecasts collected for Vietnam's
          34 provincial-level monitoring locations.

        columns:
          - name: weather_id
            data_tests:
              - unique
              - not_null

          - name: location_id
            data_tests:
              - not_null

          - name: forecast_time
            data_tests:
              - not_null

          - name: ingested_at
            data_tests:
              - not_null

          - name: rain_mm
            data_tests:
              - not_null

  - name: stormwatch_analytics

    database: "{{ env_var('DB_NAME', 'stormwatch') }}"
    schema: analytics

    description: >
      Reference tables loaded by the StormWatch Python pipelines.

    tables:
      - name: dim_locations

        description: >
          Vietnam's 34 provincial-level monitoring locations.

        columns:
          - name: location_id
            data_tests:
              - unique
              - not_null

          - name: province_code
            data_tests:
              - unique
              - not_null

          - name: province_name
            data_tests:
              - not_null

          - name: latitude
            data_tests:
              - not_null

          - name: longitude
            data_tests:
              - not_null